[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy ORM models use string forward references in Mapped["Model"] that
# ruff cannot resolve statically — suppress F821 only for the models package.
"backend/app/models/*.py" = ["F821"]
